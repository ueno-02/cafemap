<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Map</title>
</head>
<body>
    <!-- webサイトヘッダ－ -->
    <header>
        <nav id="head">
            <!-- ヘッダーリンク -->
            <ul>
                <!-- ヘッダー装飾 -->
                <img class="garland-left" src="images/garland.png" alt="装飾画像">
                <img class="garland-right" src="images/garland.png" alt="装飾画像">
                <li><a href="#">Tags<br class="header">タグから探す</a></li>
                <li><a href="#">Map<br class="header">マップから探す</a></li>
                <li><a href="#">Cafe Map</a></li>
                <li><a href="#">About<br class="header">このサイトについて</a></li>
                <li><a href="#">Contact<br class="header">お問い合わせ</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="contact">
            <h1>Cafe Map</h1>
            <h2>お問い合わせ</h2>
            <p>ご質問やご意見がございましたら、以下のフォームからお気軽にお問い合わせください。</p>
            <!-- フォーム画面 -->
            <form action="">

            <input type="text" placeholder="Name" name="name" required>

            <input type="email" placeholder="Email" name="email" required>

            <textarea placeholder="Message" name="message" required></textarea>

            <div class="captcha">
                <input type="text" placeholder="Answer" name="captcha" required>
            </div>

            <input type="submit" value="送信">

            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Cafe Map. All rights reserved.</p>
    </footer>
</body>
</html>
